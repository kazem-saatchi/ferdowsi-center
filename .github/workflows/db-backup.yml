name: Weekly Supabase DB Backup

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y gnupg curl
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        env:
          SESSION_URL: ${{ secrets.SUPABASE_SESSION_URL }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "$SESSION_URL" \
            --no-owner \
            --no-acl \
            -Fc \
            -f backup_$(date +%Y-%m-%d).dump
          gzip backup_$(date +%Y-%m-%d).dump

      - name: Checkout backup repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.BACKUP_REPO }}   # e.g. your-username/ferdowsi-db-backups
          token: ${{ secrets.BACKUP_REPO_TOKEN }}
          path: backup-repo

      - name: Commit and push backup
        run: |
          DATE=$(date +%Y-%m-%d)
          BACKUP_FILE="backup_${DATE}.dump.gz"

          cp "$BACKUP_FILE" backup-repo/

          cd backup-repo

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add "$BACKUP_FILE"
          git commit -m "backup: $DATE"
          git push
